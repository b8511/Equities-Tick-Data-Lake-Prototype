version: 2

sources:
  - name: raw
    database: equity_market
    schema: equity_market
    tables:
      - name: trades
        description: "Raw trade ticks with microsecond timestamps"
        columns:
          - name: symbol
            tests: [not_null]
          - name: timestamp
            tests: [not_null]
          - name: trade_price
            tests: [not_null]
          - name: trade_size
            tests: [not_null]

      - name: quotes
        description: "Raw L1 quote ticks (bid/ask)"
        columns:
          - name: symbol
            tests: [not_null]
          - name: timestamp
            tests: [not_null]
          - name: bid_price
            tests: [not_null]
          - name: ask_price
            tests: [not_null]

      - name: data_quality_issues
        description: "Logged data quality anomalies"

      - name: order_book_snapshots
        description: "L2 order book snapshots — 10 bid + 10 ask price levels per snapshot"
        columns:
          - name: symbol
            tests: [not_null]
          - name: timestamp
            tests: [not_null]
          - name: bid_prices
            description: "Array(Float64) — 10 bid levels, index 1 = best bid"
            tests: [not_null]
          - name: ask_prices
            description: "Array(Float64) — 10 ask levels, index 1 = best ask"
            tests: [not_null]
          - name: mid_price
            tests: [not_null]
          - name: book_imbalance
            description: "(sum_bid_vol - sum_ask_vol) / total_vol; range [-1, 1]"
