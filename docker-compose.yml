services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: bnp_clickhouse
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: equity_market
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.0.0
    container_name: bnp_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      clickhouse:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Kestra — workflow orchestration
  # UI: http://localhost:8080
  # Standalone mode with pure in-memory queue + repository (no JDBC/PostgreSQL
  # needed for local dev).  The project root is mounted at /workspace so
  # pipeline scripts are accessible from within flow tasks.
  # ---------------------------------------------------------------------------
  kestra:
    build:
      context: ./kestra
      dockerfile: Dockerfile
    container_name: bnp_kestra
    user: "root"
    command: server standalone --worker-thread=128
    ports:
      - "8080:8080" # Kestra UI & API
      - "8081:8081" # Management endpoint
    volumes:
      - kestra_data:/app/storage
      - .:/workspace # project root → /workspace
      - /var/run/docker.sock:/var/run/docker.sock # allow Docker task runner
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: memory
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: memory
          tasks:
            tmpDir:
              path: /tmp/kestra-wd
          url: http://localhost:8080/
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data:
  grafana_data:
  kestra_data:
