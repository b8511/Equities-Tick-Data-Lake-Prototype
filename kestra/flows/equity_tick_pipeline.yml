id: equity_tick_pipeline
namespace: bnp.equity
description: >
  Full equity tick data pipeline for the BNP Cash Equities prototype.
  Stages: generate_tick_data -> load_to_clickhouse -> dbt_run ->
  (parallel) quality_checks + dbt_test.
  All tasks run inside the Kestra container using /opt/venv (Python + dbt).
  NUM_TRADING_DAYS and NUMPY_SEED are controlled via the env vars below.

labels:
  project: bnp-prototype
  domain: market-data
  stack: clickhouse-dbt-grafana

tasks:
  - id: generate_tick_data
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    env:
      NUM_TRADING_DAYS: "1"
      NUMPY_SEED: "42"
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    commands:
      - echo "[1/5] Generating synthetic tick data (1 trading day) ..."
      - cd /workspace && python datagen/generate_ticks.py
      - echo "      trades    -> $(wc -l < /workspace/data/trades.csv) rows"
      - echo "      quotes    -> $(wc -l < /workspace/data/quotes.csv) rows"
      - echo "      orderbook -> $(wc -l < /workspace/data/order_book_snapshots.csv) rows"

  - id: load_to_clickhouse
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    env:
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    commands:
      - echo "[2/5] Loading data into ClickHouse ..."
      - cd /workspace && python scripts/load_data.py

  - id: dbt_run
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    env:
      VIRTUAL_ENV: /opt/venv
      PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    commands:
      - echo "[3/5] Running dbt models ..."
      - cd /workspace/dbt_project && dbt run --profiles-dir . --target docker --no-use-colors

  - id: post_dbt_checks
    type: io.kestra.plugin.core.flow.Parallel
    tasks:
      - id: quality_checks
        type: io.kestra.plugin.scripts.shell.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        env:
          VIRTUAL_ENV: /opt/venv
          PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        commands:
          - echo "[4a/5] Running data quality checks ..."
          - cd /workspace && python scripts/data_quality_check.py

      - id: dbt_test
        type: io.kestra.plugin.scripts.shell.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        env:
          VIRTUAL_ENV: /opt/venv
          PATH: /opt/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        commands:
          - echo "[4b/5] Running dbt tests ..."
          - cd /workspace/dbt_project && dbt test --profiles-dir . --target docker --no-use-colors

errors:
  - id: notify_failure
    type: io.kestra.plugin.scripts.shell.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - echo "PIPELINE FAILED - check Kestra UI for execution details"
